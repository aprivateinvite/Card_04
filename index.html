  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim:   rgba(201,168,76,0.15);
      --bg:         #0a0a0a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Sora', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 55%, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .container {
      position: relative; z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .icon-wrap {
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }
    .icon-wrap svg {
      width: 48px; height: 48px;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.5));
    }

    .headline {
      font-size: clamp(1.25rem, 4vw, 1.85rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      text-align: center;
      color: #f0f0f0;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.45s;
      max-width: 560px;
      line-height: 1.5;
    }
    .headline span { color: var(--gold-light); font-weight: 600; }

    .subtext {
      margin-top: 0.75rem;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      font-weight: 300;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.65s;
    }

    .progress-wrap {
      margin-top: 3rem;
      width: min(380px, 85vw);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.85s;
    }

    .progress-track {
      position: relative;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
      border-radius: 99px;
      box-shadow: 0 0 12px rgba(201,168,76,0.6);
      transition: width 0.12s linear;
    }

    .progress-bar::after {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 60px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
      animation: shimmer 1.2s linear infinite;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-60px); opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateX(60px); opacity: 0; }
    }

    .progress-label {
      margin-top: 1rem;
      text-align: right;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
    }

    .dots {
      margin-top: 2.5rem;
      display: flex; gap: 8px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1s;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold-dim);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { background: var(--gold-dim); transform: scale(1); }
      50%       { background: var(--gold);     transform: scale(1.4); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-out { animation: fadeOut 0.7s ease forwards !important; }
    @keyframes fadeOut {
      to { opacity: 0; transform: scale(0.97); }
    }
  </style>
</head>
<body>

<div class="container" id="root">

  <div class="icon-wrap">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="23" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4 3"/>
      <path d="M16 24l6 6 10-12" stroke="#e8c97a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="headline" id="headline"></div>
  <div class="subtext"  id="subtext"></div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-bar" id="bar"></div>
    </div>
    <div class="progress-label" id="pct">0%</div>
  </div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

</div>

<script>
  // ═══════════════════════════════════════════════════
  //  CONFIGURAÇÕES
  // ═══════════════════════════════════════════════════
  const AFFILIATE_URL = 'https://t.ajrkmx1.com/205192/8780/0?aff_sub5=SF_006OG000004lmDN';
  const DURATION_MS   = 3500;   // duração da barra em ms
  const REDIRECT_DELAY = 400;   // pausa após 100% antes de redirecionar

  // ═══════════════════════════════════════════════════
  //  TRADUÇÕES
  // ═══════════════════════════════════════════════════
  const i18n = {
    pt: { headline: 'Aguarde... estamos preparando <span>tudo para você</span>.', sub: 'Redirecionando em instantes' },
    en: { headline: 'Please wait... we\'re getting <span>everything ready for you</span>.', sub: 'Redirecting in a moment' },
    es: { headline: 'Espere... estamos preparando <span>todo para usted</span>.', sub: 'Redireccionando en un momento' },
    fr: { headline: 'Veuillez patienter... nous préparons <span>tout pour vous</span>.', sub: 'Redirection dans un instant' },
    de: { headline: 'Bitte warten... wir bereiten <span>alles für Sie vor</span>.', sub: 'Weiterleitung in Kürze' },
    it: { headline: 'Attendere... stiamo preparando <span>tutto per te</span>.', sub: 'Reindirizzamento a breve' },
    ja: { headline: '少々お待ちください... <span>準備を整えています</span>。', sub: 'まもなくリダイレクトします' },
    zh: { headline: '请稍候... 我们正在为您<span>准备一切</span>。', sub: '即将重定向' },
    ko: { headline: '잠시 기다려 주세요... <span>모든 것을 준비하고 있습니다</span>.', sub: '곧 리디렉션됩니다' },
    ru: { headline: 'Подождите... мы готовим <span>всё для вас</span>.', sub: 'Перенаправление через мгновение' },
    ar: { headline: 'يرجى الانتظار... نحن نجهّز <span>كل شيء لك</span>.', sub: 'إعادة التوجيه خلال لحظات' },
    hi: { headline: 'कृपया प्रतीक्षा करें... हम <span>आपके लिए सब कुछ तैयार कर रहे हैं</span>।', sub: 'एक क्षण में पुनर्निर्देशित हो रहे हैं' },
  };

  function getLang() {
    const langs = navigator.languages?.length ? navigator.languages : [navigator.language || 'en'];
    for (const l of langs) {
      const prefix = l.split('-')[0].toLowerCase();
      if (i18n[prefix]) return prefix;
    }
    return 'en';
  }

  const lang = getLang();
  const t = i18n[lang] || i18n['en'];
  document.getElementById('headline').innerHTML = t.headline;
  document.getElementById('subtext').textContent  = t.sub;
  document.documentElement.lang = lang;
  if (['ar','he','fa','ur'].includes(lang)) document.documentElement.dir = 'rtl';

  // ═══════════════════════════════════════════════════
  //  BARRA DE PROGRESSO
  // ═══════════════════════════════════════════════════
  const bar  = document.getElementById('bar');
  const pct  = document.getElementById('pct');
  const root = document.getElementById('root');

  function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  let start = null;
  function animate(ts) {
    if (!start) start = ts;
    const raw    = Math.min((ts - start) / DURATION_MS, 1);
    const eased  = easeInOut(raw);
    const percent = Math.round(eased * 100);
    bar.style.width   = percent + '%';
    pct.textContent   = percent + '%';
    if (raw < 1) {
      requestAnimationFrame(animate);
    } else {
      setTimeout(() => {
        root.classList.add('fade-out');
        setTimeout(() => { window.location.href = AFFILIATE_URL; }, 700);
      }, REDIRECT_DELAY);
    }
  }

  setTimeout(() => requestAnimationFrame(animate), 950);
</script>
</body>
</html>
